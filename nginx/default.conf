map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

map $http_cf_connecting_ip $pi_client_ip {
  default $http_cf_connecting_ip;
  ''      $remote_addr;
}

upstream mastodon_web {
  server web:3000;
  keepalive 16;
}

upstream mastodon_streaming {
  server streaming:4000;
  keepalive 16;
}

server {
  listen 80;
  server_name _;
  server_tokens off;

  client_max_body_size 100m;
  proxy_connect_timeout 30s;
  proxy_send_timeout 300s;
  proxy_read_timeout 300s;

  location = /_pi/health {
    access_log off;
    add_header Cache-Control "no-store" always;
    default_type text/plain;
    return 200 "PI OS OK\n";
  }

  location ^~ /api/v1/streaming {
    proxy_pass http://mastodon_streaming;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $pi_client_ip;
    proxy_set_header X-Forwarded-For $pi_client_ip;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Proxy "";

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_buffering off;
    proxy_redirect off;
    proxy_read_timeout 86400s;
    tcp_nodelay on;
  }

  location / {
    proxy_pass http://mastodon_web;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $pi_client_ip;
    proxy_set_header X-Forwarded-For $pi_client_ip;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Proxy "";

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_buffering on;
    proxy_redirect off;
    tcp_nodelay on;
  }
}
