map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

map $http_cf_connecting_ip $pi_client_ip {
  default $http_cf_connecting_ip;
  ''      $remote_addr;
}

upstream mastodon_web {
  server web:3000;
  keepalive 16;
}

upstream mastodon_streaming {
  server streaming:4000;
  keepalive 16;
}

# Windows keeps the resident tokens under DPAPI. Docker Desktop's verified
# host.docker.internal bridge reaches this loopback-only host process without
# exposing the MCP port on the LAN.
upstream cmx_mcp {
  server host.docker.internal:8766;
  keepalive 8;
}

server {
  listen 80;
  server_name _;
  server_tokens off;

  client_max_body_size 100m;
  proxy_connect_timeout 30s;
  proxy_send_timeout 300s;
  proxy_read_timeout 300s;

  location = /_pi/health {
    access_log off;
    add_header Cache-Control "no-store" always;
    default_type text/plain;
    return 200 "PI OS OK\n";
  }

  location = /_pi/mcp-health {
    proxy_pass http://cmx_mcp/_cmx/mcp-health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Connection "";
    proxy_buffering off;
  }

  location = /.well-known/oauth-authorization-server {
    proxy_pass http://cmx_mcp;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $pi_client_ip;
    proxy_set_header X-Forwarded-For $pi_client_ip;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Connection "";
    proxy_buffering off;
  }

  location ~ ^/\.well-known/oauth-protected-resource/mcp/[a-z0-9_-]+$ {
    proxy_pass http://cmx_mcp;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $pi_client_ip;
    proxy_set_header X-Forwarded-For $pi_client_ip;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Connection "";
    proxy_buffering off;
  }

  location ~ ^/(authorize|token|register|revoke|mcp/[a-z0-9_-]+)$ {
    client_max_body_size 1m;
    proxy_pass http://cmx_mcp;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $pi_client_ip;
    proxy_set_header X-Forwarded-For $pi_client_ip;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_read_timeout 300s;
  }

  location ^~ /api/v1/streaming {
    proxy_pass http://mastodon_streaming;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $pi_client_ip;
    proxy_set_header X-Forwarded-For $pi_client_ip;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Proxy "";

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_buffering off;
    proxy_redirect off;
    proxy_read_timeout 86400s;
    tcp_nodelay on;
  }

  location / {
    proxy_pass http://mastodon_web;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $pi_client_ip;
    proxy_set_header X-Forwarded-For $pi_client_ip;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Proxy "";

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_buffering on;
    proxy_redirect off;
    tcp_nodelay on;
  }
}
